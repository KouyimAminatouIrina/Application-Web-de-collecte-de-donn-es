<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collecte de problèmes de véhicules</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <h1>Signaler un problème avec votre véhicule</h1>
        <p>Indiquez votre ville et décrivez le problème rencontré. Nous vous proposerons une cause probable et des solutions.</p>

        <form action="/submit" method="post">
            <label for="name">Nom (optionnel)</label>
            <input type="text" id="name" name="name" placeholder="Votre prénom" />

            <label for="city">Ville</label>
            <input type="text" id="city" name="city" placeholder="Ex : Paris" required />

            <label for="vehicle_model">Modèle de véhicule</label>
            <input type="text" id="vehicle_model" name="vehicle_model" placeholder="Ex : Renault Clio" />

            <label for="problem_description">Description du problème</label>
            <textarea id="problem_description" name="problem_description" rows="5" placeholder="Par exemple : Le moteur fait un bruit étrange au démarrage" required></textarea>

            <button type="submit">Envoyer</button>
        </form>

        <div class="links">
            <a href="/analysis">Voir l'analyse des rapports</a>
        </div>
    </div>
</body>
</html>
