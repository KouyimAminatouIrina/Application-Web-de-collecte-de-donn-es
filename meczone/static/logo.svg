<svg width="240" height="280" viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .modern-text { font-family: 'Arial', 'Helvetica', sans-serif; font-weight: bold; }
      .cameroun-text { font-family: 'Arial', 'Helvetica', sans-serif; font-size: 14px; }
    </style>
  </defs>
  
  <!-- Background circle with flag colors (vertical stripes) -->
  <rect x="40" y="20" width="30" height="140" fill="#007A5E" rx="5"/>
  <rect x="70" y="20" width="30" height="140" fill="#CE1126" rx="5"/>
  <rect x="100" y="20" width="30" height="140" fill="#FCD116" rx="5"/>
  
  <!-- Main circle background -->
  <circle cx="120" cy="90" r="85" fill="#f0f4f8" stroke="#007A5E" stroke-width="3"/>
  
  <!-- Steering wheel -->
  <circle cx="120" cy="90" r="50" fill="none" stroke="#CE1126" stroke-width="4"/>
  <circle cx="120" cy="90" r="8" fill="#333"/>
  
  <!-- Steering wheel spokes -->
  <line x1="120" y1="40" x2="120" y2="50" stroke="#CE1126" stroke-width="3"/>
  <line x1="120" y1="130" x2="120" y2="140" stroke="#CE1126" stroke-width="3"/>
  <line x1="70" y1="90" x2="80" y2="90" stroke="#CE1126" stroke-width="3"/>
  <line x1="160" y1="90" x2="170" y2="90" stroke="#CE1126" stroke-width="3"/>
  
  <!-- Gear integrated with steering wheel -->
  <g transform="translate(155, 55)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FCD116" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FCD116" stroke-width="2"/>
    <!-- Gear teeth -->
    <rect x="-2" y="-22" width="4" height="6" fill="#FCD116"/>
    <rect x="15" y="-8" width="6" height="4" fill="#FCD116"/>
    <rect x="15" y="4" width="6" height="4" fill="#FCD116"/>
    <rect x="-2" y="16" width="4" height="6" fill="#FCD116"/>
    <rect x="-22" y="-2" width="6" height="4" fill="#FCD116"/>
    <rect x="-22" y="4" width="6" height="4" fill="#FCD116"/>
  </g>
  
  <!-- Cameroon map silhouette (simplified) -->
  <path d="M 110 100 Q 115 95 118 100 Q 120 105 115 110 Q 110 108 110 100" fill="#007A5E" opacity="0.7"/>
  
  <!-- Text: MecZone -->
  <text x="120" y="180" text-anchor="middle" font-size="32" font-weight="bold" fill="#1f3f5b" class="modern-text" style="font-style: italic;">MecZone</text>
  
  <!-- Text: Cameroun -->
  <text x="120" y="205" text-anchor="middle" font-size="16" fill="#CE1126" class="cameroun-text">Cameroun</text>
  
  <!-- Decorative line -->
  <line x1="70" y1="215" x2="170" y2="215" stroke="#FCD116" stroke-width="2"/>
</svg>