<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MecZone - Collecte de problèmes de véhicules</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <h1>🔧 MecZone</h1>
        <p style="text-align: center; color: #666; margin-bottom: 1.5rem;">Signaler un problème avec votre véhicule</p>
        <h2 style="font-size: 1.1rem; color: #333;">Décrivez votre problème</h2>


        <form action="/submit" method="post">
            <label for="name">Nom (optionnel)</label>
            <input type="text" id="name" name="name" placeholder="Votre prénom" />

            <label for="city">Ville</label>
            <input type="text" id="city" name="city" placeholder="Ex : Paris" required />

            <label for="vehicle_model">Modèle de véhicule</label>
            <input type="text" id="vehicle_model" name="vehicle_model" placeholder="Ex : Renault Clio" />

            <label for="vehicle_year">Année de construction</label>
            <input type="number" id="vehicle_year" name="vehicle_year" placeholder="Ex : 2020" min="1900" max="2099" required />

            <label for="problem_description">Description du problème</label>
            <textarea id="problem_description" name="problem_description" rows="5" placeholder="Par exemple : Le moteur fait un bruit étrange au démarrage" required></textarea>

            <button type="submit">Envoyer</button>
        </form>

        <div class="links">
            <a href="/analysis">Voir l'analyse des rapports</a>
        </div>
    </div>
</body>
</html>
